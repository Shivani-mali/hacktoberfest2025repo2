<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Static Blog</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>MY_STATIC_BLOG_PAGE</h1>
  </header>
  <nav>
    <a href="#"> 🏡 Home</a>
    <a href="#"> 🗣️ About</a>
    <a href="#"> ☎ Contact</a>
  </nav>
  <main>
    <section id="categories">
      <h2>Categories</h2>
      <button onclick="showCategory('books')">📚 Book Reviews</button>
      <button onclick="showCategory('tech')">💻 Tech Trends</button>
      <button onclick="showCategory('travel')">🌍 Travel Diaries</button>
      <button onclick="showCategory('food')">🍕 Food Adventures</button>
      <button onclick="showCategory('code')">👨‍💻 Code & Beyond</button>
    </section>

    <!-- Corrected Blog List Section -->
    <section id="blog-list">
      <h2></h2>
    </section>

    <!-- Blog Content Section -->
    <section id="blog-content">
      <h2>Select a category to view blogs</h2>
      <h3>Your content will appear here when you click a category button above.</h3>
    </section>
  </main>
  
  <footer>
    <p>&copy; 2025 MY_STATIC_BLOG_PAGE. All rights reserved.</p>
  </footer>
  
  <script src="script.js"></script>
</body>
</html>
